name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit dependencies
        continue-on-error: true
        run: pip install pip-audit && pip-audit -r 플라잉센터자동화/requirements.txt

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./플라잉센터자동화
          push: true
          tags: ghcr.io/flying-japan/int-center-luggage-prd:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/projects/Flying-Japan/int-center-luggage-prd
            git pull origin main --quiet
            cd 플라잉센터자동화
            docker compose -p flying-japan build --build-arg CACHE_BUST="$(git rev-parse --short HEAD)" app
            docker compose -p flying-japan up -d
            echo "Deployed $(git rev-parse --short HEAD) at $(date)"
