name: Build & Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit dependencies
        continue-on-error: true
        run: pip install pip-audit && pip-audit -r 플라잉센터자동화/requirements.txt

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./플라잉센터자동화
          push: true
          tags: ghcr.io/flying-japan/int-center-luggage-prd:latest

      - name: Make package public for Watchtower
        continue-on-error: true
        run: |
          curl -sf -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/orgs/Flying-Japan/packages/container/int-center-luggage-prd \
            -d '{"visibility":"public"}'
