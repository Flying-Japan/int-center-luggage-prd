name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit dependencies
        continue-on-error: true
        run: pip install pip-audit && pip-audit -r 플라잉센터자동화/requirements.txt

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./플라잉센터자동화
          push: true
          tags: ghcr.io/flying-japan/int-center-luggage-prd:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << 'EOF'
          Host ssh-luggage.flyingjp.com
            HostName ssh-luggage.flyingjp.com
            User ${{ secrets.SERVER_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

      - name: Deploy via SSH tunnel
        env:
          CF_Access_Client_Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_Access_Client_Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          ssh -F ~/.ssh/config ${{ secrets.SERVER_USER }}@ssh-luggage.flyingjp.com << 'ENDSSH'
            cd ~/projects/Flying-Japan/int-center-luggage-prd
            git pull origin main --quiet
            git checkout HEAD -- .
            cd 플라잉센터자동화
            docker compose -p flying-japan build --build-arg CACHE_BUST="$(git rev-parse --short HEAD)" app
            docker compose -p flying-japan up -d --no-deps --wait app
            echo "Deployed $(git rev-parse --short HEAD) at $(date)"
          ENDSSH
